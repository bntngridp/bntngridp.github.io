<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repositories | Bintang Ridwan Pribadi</title>
  <link rel="icon" href="../img/general/logo.png" type="image/icon type">

  <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

  <!-- pakai CSS global -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
<!-- ===== Header / Navbar ===== -->
<header id="navbar">
  <div class="logo">
    <div class="logo-box">B</div>
  </div>

  <ul class="navlist">
    <li><a href="../index.html">About</a></li>
    <li><a href="portofolio.html">Portfolio</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a href="repository.html" class="active">Repositories</a></li>
    <li><a href="cv.html">CV</a></li>
    <li><a href="blog.html">Blog</a></li>
  </ul>

  <div class="header-btns">
    <div class="search-trigger" id="search-btn">
      <i class="ri-search-line"></i>
      <span class="search-kb">/ K</span>
    </div>
    <div class="theme-toggle" id="theme-toggle">
      <i class="ri-moon-line"></i>
    </div>
    <div class="bx bx-menu" id="menu-icon"></div>
  </div>
</header>

<!-- ===== Search Modal ===== -->
<div class="search-modal" id="search-modal">
  <div class="search-box">
    <input type="text" placeholder="Type to search...">
    <ul>
      <li><a href="portofolio.html">Portfolio</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="certifications.html">Certifications</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="../index.html">About</a></li>
      <li><a href="repository.html">Repositories</a></li>
    </ul>
  </div>
</div>

<!-- ===== Page Content ===== -->
<main class="page-content">
  <section class="repo-header" data-aos="fade-down">
    <div class="repo-stats">
      <div class="stat-item">
        <h2 id="total-repos">0</h2>
        <p>Repositories</p>
      </div>
      <div class="stat-item">
        <h2 id="total-stars">0</h2>
        <p>Total Stars</p>
      </div>
      <div class="stat-item">
        <h2 id="total-forks">0</h2>
        <p>Total Forks</p>
      </div>
    </div>
  </section>

  <!-- Pindahkan filter DI ATAS list repos dan tambahkan id pada elemen penting -->
  <div class="repo-filters" data-aos="fade-up">
    <input
      type="text"
      class="search-input"
      id="repo-search-input"
      placeholder="Search repositories..."
    >
    <select class="filter-select" id="repo-language-filter">
      <option value="all">All Languages</option>
      <option value="PHP">PHP</option>
      <option value="JavaScript">JavaScript</option>
      <option value="Dart">Dart</option>
    </select>
    <select class="filter-select" id="repo-sort-filter">
      <option value="updated">Recently Updated</option>
      <option value="stars">Most Stars</option>
    </select>
    <button type="button" class="reset-btn" id="repo-reset-btn">
      <i class="ri-refresh-line"></i> RESET
    </button>
  </div>

  <!-- repo-grid dibungkus oleh #repo-container -->
  <div id="repo-container" class="repo-grid">
    <p style="text-align: center; grid-column: 1/-1;">
      Fetching repositories from GitHub...
    </p>
  </div>

  <!-- container pagination di bawah repo-grid -->
  <div id="pagination" class="pagination-container">
    <!-- tombol pagination akan di-generate lewat JS -->
  </div>
</main>

<!-- ===== Footer ===== -->
<footer class="footer">
  <p>© 2026 Bintang Ridwan Pribadi. Powered by GitHub API.</p>
</footer>

<!-- ===== Scripts ===== -->
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init({ offset: 100, duration: 1000, once: true });
</script>
<script src="../js/script.js"></script>
</body>
</html>
